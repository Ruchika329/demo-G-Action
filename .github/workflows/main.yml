name: CI/CD Workflow

# 1. Event / Trigger (Orange Box)
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # Manual trigger

jobs:
  # 2. Job: build (Green Box)
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Step 1: Checkout
        uses: actions/checkout@v4

      - name: Step 2: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Step 3: Run tests
        run: npm test

      - name: Step 4: Build
        run: npm run build

  # 3. Job: deploy (Blue Box)
  deploy:
    runs-on: ubuntu-latest
    needs: build # This ensures 'build' finishes first!
    steps:
      - name: Step 1: Download artifact
        uses: actions/download-artifact@v4

      - name: Step 2: Deploy to cloud
        run: ./deploy.sh

      - name: Step 3: Notify Slack
        uses: slackapi/slack-action@v2
        with:
          status: ${{ job.status }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
